<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delay the End</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS Variables & Reset
   ============================================ */
:root {
  /* Core palette */
  --bg-deep: #0d0d1a;
  --bg-surface: #1a1a2e;
  --parchment: #f4e8c1;
  --parchment-dim: #c4b896;
  --parchment-faint: rgba(244, 232, 193, 0.06);
  --ink: #2c2416;
  --gold: #c9a84c;
  --gold-dim: rgba(201, 168, 76, 0.3);
  --blood: #8b2e2e;
  --blood-glow: rgba(139, 46, 46, 0.4);
  --heaven-blue: #6e8ca8;
  --hell-amber: #c46a32;
  --stability-green: #5a8a5e;
  --pressure-red: #a83232;
  --ghost: rgba(244, 232, 193, 0.12);

  /* Typography */
  --font-display: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
  --font-body: 'Lora', 'Noto Serif SC', Georgia, serif;
  --font-zh: 'Noto Serif SC', '宋体', serif;

  /* Spacing */
  --space-xs: 0.5rem;
  --space-sm: 1rem;
  --space-md: 2rem;
  --space-lg: 4rem;
  --space-xl: 6rem;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg-deep);
  color: var(--parchment);
  font-family: var(--font-body);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ============================================
   Texture & Atmosphere Layer
   ============================================ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(13, 13, 26, 0.78), rgba(13, 13, 26, 0.9)),
    url("./assets/bg/IrisZhou_dark_atmospheric_London_street_illustration_fog_vint_60d8b786-7b09-4b1b-9b2b-364226ea47bd_2.png"),
    radial-gradient(ellipse at 20% 50%, rgba(110, 140, 168, 0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(196, 106, 50, 0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(139, 46, 46, 0.05) 0%, transparent 50%);
  background-size: auto, cover, auto, auto, auto;
  background-position: center center;
  background-repeat: no-repeat;
  transform: translateZ(0);
  will-change: transform;
  pointer-events: none;
  z-index: 0;
}

/* Noise grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

.decor-layer {
  position: fixed;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}

.decor-item {
  position: absolute;
  width: clamp(72px, 10vw, 140px);
  opacity: 0.18;
  filter: sepia(0.28) saturate(0.88) brightness(0.9);
}

.decor-item.glasses {
  top: 10vh;
  right: 7vw;
  transform: rotate(-12deg);
}

.decor-item.coffee {
  bottom: 12vh;
  left: 8vw;
  transform: rotate(7deg);
}

.decor-item.book {
  top: 22vh;
  left: 6vw;
  transform: rotate(-8deg);
}

.decor-item.car {
  bottom: 7vh;
  right: 8vw;
  transform: rotate(5deg);
}

/* ============================================
   SVG Icon Definitions (Hidden, referenced by <use>)
   ============================================ */
.svg-defs { position: absolute; width: 0; height: 0; overflow: hidden; }

/* ============================================
   Landing Page
   ============================================ */
.landing {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding:
    max(env(safe-area-inset-top), clamp(1rem, 4vh, 2.5rem))
    1rem
    max(env(safe-area-inset-bottom), 1.2rem);
  overflow-y: auto;
  overscroll-behavior: contain;
  z-index: 100;
  background: var(--bg-deep);
  transition: opacity 1.2s ease;
}

.landing.fade-out {
  opacity: 0;
  pointer-events: none;
}

/* Prologue text — typewriter */
.prologue {
  text-align: center;
  opacity: 0;
  animation: fadeIn 1.5s ease 0.5s forwards;
}

.prologue-en {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.15rem;
  color: var(--parchment-dim);
  letter-spacing: 0.08em;
  margin-bottom: 0.6rem;
}

.prologue-zh {
  font-family: var(--font-zh);
  font-size: 1rem;
  color: var(--parchment-dim);
  opacity: 0.7;
}

.prologue.hide {
  animation: fadeOut 1.5s ease forwards;
}

/* Main title */
.landing-title {
  text-align: center;
  opacity: 0;
  transform: translateY(12px);
}

.landing-title.show {
  animation: riseIn 2s ease forwards;
}

.landing-title h1 {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 6vw, 4.5rem);
  font-weight: 700;
  color: var(--parchment);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.3em;
  text-shadow: 0 0 60px rgba(201, 168, 76, 0.15);
}

.landing-title .subtitle {
  font-family: var(--font-display);
  font-style: italic;
  font-size: clamp(0.9rem, 2vw, 1.15rem);
  color: var(--parchment-dim);
  letter-spacing: 0.06em;
  line-height: 1.8;
  max-width: min(92vw, 760px);
  white-space: normal;
  text-wrap: balance;
  margin: 0 auto;
}

.landing-cta {
  margin-top: clamp(1rem, 5vh, 2.5rem);
}

.landing-title .subtitle-zh {
  font-family: var(--font-zh);
  font-style: normal;
  display: block;
  margin-top: 0.4em;
  font-size: 0.95em;
  opacity: 0.7;
}

/* Decorative line */
.landing-divider {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: var(--space-md) auto;
  opacity: 0;
}

.landing-divider.show {
  animation: fadeIn 1.5s ease forwards;
}

/* CTA Button */
.cta-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.7em;
  font-family: var(--font-display);
  font-size: 1rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--parchment);
  background: transparent;
  border: 1px solid var(--gold-dim);
  padding: 0.9em 2.4em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transition: all 0.4s ease;
  white-space: nowrap;
}

.cta-en,
.cta-zh {
  display: inline-block;
}

.cta-sep {
  opacity: 0.8;
  letter-spacing: 0;
}

.cta-btn.show {
  animation: fadeIn 1s ease forwards;
}

.cta-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201, 168, 76, 0.08), transparent);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.cta-btn:hover {
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(201, 168, 76, 0.1), inset 0 0 30px rgba(201, 168, 76, 0.05);
}

.cta-btn:hover::before { opacity: 1; }

/* Breathing glow on CTA */
.cta-btn.show {
  animation: fadeIn 1s ease forwards, breathe 4s ease-in-out 2s infinite;
}

/* Decorative corner marks on landing */
.corner-mark {
  position: fixed;
  width: 40px;
  height: 40px;
  opacity: 0;
  transition: opacity 2s ease;
}
.corner-mark.show { opacity: 0.15; }
.corner-mark svg { width: 100%; height: 100%; }

.corner-mark.tl { top: 30px; left: 30px; }
.corner-mark.tr { top: 30px; right: 30px; transform: scaleX(-1); }
.corner-mark.bl { bottom: 30px; left: 30px; transform: scaleY(-1); }
.corner-mark.br { bottom: 30px; right: 30px; transform: scale(-1, -1); }

/* ============================================
   Game Container (hidden during landing)
   ============================================ */
.game-container {
  display: none;
  max-width: 800px;
  margin: 0 auto;
  padding: var(--space-md);
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  z-index: 10;
}

.game-container.active {
  display: block;
  animation: fadeIn 1.5s ease;
}

/* ---- Top Bar: Language Toggle + Round ---- */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.6rem;
  padding-bottom: var(--space-sm);
  border-bottom: 1px solid var(--ghost);
  margin-bottom: var(--space-md);
}

.round-indicator {
  font-family: var(--font-display);
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--parchment-dim);
}

.lang-toggle {
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--parchment-dim);
  background: none;
  border: 1px solid var(--ghost);
  padding: 0.3em 0.8em;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.3s ease;
}

.lang-toggle:hover {
  border-color: var(--gold-dim);
  color: var(--parchment);
}

/* ---- Stat Bars ---- */
.stat-bars {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm) var(--space-md);
  margin-bottom: var(--space-lg);
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 0.7rem;
}

.stat-icon {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  opacity: 0.85;
}

.stat-info { flex: 1; }

.stat-label {
  font-family: var(--font-display);
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--parchment-dim);
  margin-bottom: 0.3em;
  display: flex;
  justify-content: space-between;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 0.75rem;
  color: var(--parchment);
}

.stat-bar-track {
  width: 100%;
  height: 6px;
  background: var(--ghost);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}

.stat-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
}

.stat-bar-fill.heaven { background: linear-gradient(90deg, var(--heaven-blue), #8aa8c4); }
.stat-bar-fill.hell   { background: linear-gradient(90deg, var(--hell-amber), #d4884a); }
.stat-bar-fill.stability { background: linear-gradient(90deg, var(--stability-green), #7aaa7e); }
.stat-bar-fill.pressure  { background: linear-gradient(90deg, var(--pressure-red), #c84848); }

/* Tick marks on bar */
.stat-bar-track::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 9.8%,
    rgba(244, 232, 193, 0.08) 9.8%,
    rgba(244, 232, 193, 0.08) 10.2%
  );
  z-index: 1;
}

/* ---- Event Card ---- */
.event-card {
  background: rgba(244, 232, 193, 0.03);
  border: 1px solid var(--ghost);
  padding: var(--space-md);
  margin-bottom: var(--space-md);
  position: relative;
}

.event-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: linear-gradient(180deg, var(--gold-dim), transparent);
}

.event-title {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--parchment);
  margin-bottom: var(--space-sm);
  letter-spacing: 0.03em;
}

.event-text {
  font-family: var(--font-body);
  font-size: 0.95rem;
  line-height: 1.85;
  white-space: pre-line;
  overflow-wrap: anywhere;
  color: var(--parchment-dim);
  margin-bottom: var(--space-md);
}

/* ---- Choice Buttons ---- */
.choices {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}

.choice-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  text-align: center;
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--parchment);
  background: rgba(244, 232, 193, 0.04);
  border: 1px solid rgba(244, 232, 193, 0.1);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  line-height: 1.5;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: normal;
  line-break: loose;
  min-height: 84px;
  padding: 0.95em 1.2em;
}

.choice-btn:hover {
  background: rgba(244, 232, 193, 0.08);
  border-color: var(--gold-dim);
  transform: translateY(-1px);
}

.choice-btn .choice-id {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--gold);
  font-size: 0.85em;
  line-height: 1;
  position: absolute;
  left: 1.2em;
  top: 50%;
  transform: translateY(-50%);
  width: 2.2em;
  text-align: left;
  pointer-events: none;
}

.choice-btn .choice-text {
  display: inline-block;
  max-width: calc(100% - 4.8em);
  margin: 0 auto;
  line-height: 1.58;
  text-align: center;
}

.choice-btn.selected-consequence {
  background: rgba(201, 168, 76, 0.08);
  border-color: var(--gold-dim);
  color: var(--parchment-dim);
  line-height: 1.6;
  white-space: normal;
}

.choice-btn.selected-consequence .choice-id {
  color: var(--gold);
}

.choice-btn.extreme {
  border-left: 2px solid var(--blood);
}

.choice-btn.extreme:hover {
  border-color: var(--blood);
  box-shadow: inset 3px 0 12px var(--blood-glow);
}

/* ---- Record Phase ---- */
.record-phase {
  margin-top: var(--space-md);
  padding-top: var(--space-md);
  border-top: 1px solid var(--ghost);
}

.record-title {
  font-family: var(--font-display);
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--parchment-dim);
  margin-bottom: var(--space-sm);
}

.record-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}

.record-btn {
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--parchment-dim);
  background: rgba(201, 168, 76, 0.04);
  border: 1px solid rgba(201, 168, 76, 0.12);
  border-left-width: 3px;
  padding: 0.8em 1em;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
  line-height: 1.4;
  position: relative;
}

.record-btn:hover {
  color: var(--parchment);
  background: rgba(201, 168, 76, 0.08);
  border-color: var(--gold-dim);
}

.record-btn--truth   { border-left-color: var(--parchment-dim); }
.record-btn--polish  { border-left-color: var(--heaven-blue); }
.record-btn--blur    { border-left-color: var(--hell-amber); }
.record-btn--seal    { border-left-color: var(--blood); }

.record-btn[data-tooltip-zh]::after {
  content: attr(data-tooltip-zh);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  width: max-content;
  max-width: min(86vw, 320px);
  padding: 0.55em 0.85em;
  font-family: var(--font-body);
  font-style: italic;
  font-size: 0.78rem;
  line-height: 1.55;
  color: var(--parchment);
  background: rgba(20, 20, 34, 0.98);
  border: 1px solid var(--gold-dim);
  white-space: normal;
  text-align: left;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 50;
}

html[lang="en"] .record-btn[data-tooltip-en]::after {
  content: attr(data-tooltip-en);
}

.record-btn:hover::after,
.record-btn:focus-visible::after {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ---- Top-bar Cocoa Button ---- */
.top-bar-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.cocoa-btn {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--parchment-dim);
  background: none;
  border: 1px solid var(--ghost);
  padding: 0.3em 0.7em;
  cursor: pointer;
  letter-spacing: 0.05em;
  display: inline-flex;
  align-items: center;
  gap: 0.35em;
  transition: all 0.3s ease;
  position: relative;
}

.cocoa-btn:hover:not(.spent) {
  border-color: var(--gold-dim);
  color: var(--parchment);
}

.cocoa-btn .cocoa-icon {
  display: inline-block;
  font-size: 1em;
  line-height: 1;
  transition: transform 0.4s ease, filter 0.4s ease;
}

.cocoa-btn:hover:not(.spent) .cocoa-icon {
  transform: translateY(-1px);
  filter: drop-shadow(0 0 4px rgba(201, 168, 76, 0.5));
}

.cocoa-btn.spent {
  opacity: 0.35;
  cursor: default;
  border-color: var(--ghost);
}

.cocoa-btn[data-tooltip-zh]::after {
  content: attr(data-tooltip-zh);
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  width: max-content;
  max-width: min(80vw, 280px);
  padding: 0.5em 0.8em;
  font-family: var(--font-body);
  font-style: italic;
  font-size: 0.76rem;
  line-height: 1.55;
  color: var(--parchment);
  background: rgba(20, 20, 34, 0.98);
  border: 1px solid var(--gold-dim);
  white-space: normal;
  text-align: left;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 50;
}

html[lang="en"] .cocoa-btn[data-tooltip-en]::after {
  content: attr(data-tooltip-en);
}

.cocoa-btn:not(.spent):hover::after,
.cocoa-btn:not(.spent):focus-visible::after {
  opacity: 1;
}

/* ---- Imbalance Warning ---- */
.balance-warning {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 0.82rem;
  color: var(--blood);
  letter-spacing: 0.04em;
  margin: -1.6rem 0 var(--space-md);
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

.balance-warning.visible {
  opacity: 0.85;
}

/* ---- Interstitial Marker (resurface / pressure threshold) ---- */
.interstitial-marker {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blood);
  margin-bottom: 0.6rem;
}

.event-card.is-interstitial::before {
  background: linear-gradient(180deg, var(--blood-glow), transparent);
}

/* ---- Run Archive (end of game review) ---- */
.run-archive {
  width: min(92vw, 680px);
  margin: 0 auto var(--space-lg);
  max-height: 60vh;
  overflow-y: auto;
  padding: var(--space-sm) var(--space-md);
  border-top: 1px solid var(--ghost);
  border-bottom: 1px solid var(--ghost);
  text-align: left;
}

.run-archive:empty {
  display: none;
}

.run-archive-title {
  font-family: var(--font-display);
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: var(--space-sm);
  text-align: center;
}

.archive-entry {
  padding: 0.85rem 0;
  border-bottom: 1px dashed rgba(244, 232, 193, 0.08);
}

.archive-entry:last-child {
  border-bottom: none;
}

.archive-entry-head {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--gold);
  letter-spacing: 0.04em;
  margin-bottom: 0.3em;
}

.archive-entry-round {
  color: var(--parchment-dim);
  margin-right: 0.6em;
  letter-spacing: 0.12em;
  font-size: 0.72rem;
  text-transform: uppercase;
}

.archive-entry-choice {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--parchment-dim);
  margin-bottom: 0.4em;
  padding-left: 0.8em;
  border-left: 2px solid var(--gold-dim);
}

.archive-entry-consequence {
  font-family: var(--font-body);
  font-size: 0.92rem;
  line-height: 1.75;
  color: var(--parchment);
  white-space: pre-line;
  overflow-wrap: anywhere;
}

/* ---- Tutorial Overlay ---- */
.tutorial-overlay {
  position: fixed;
  inset: 0;
  z-index: 260;
  display: none;
  pointer-events: auto;
}

.tutorial-overlay.active {
  display: block;
}

.tutorial-highlight {
  position: fixed;
  border: 1px solid var(--gold);
  box-shadow:
    0 0 0 9999px rgba(13, 13, 26, 0.72),
    0 0 24px rgba(201, 168, 76, 0.2);
  border-radius: 6px;
  pointer-events: none;
}

.tutorial-bubble {
  position: fixed;
  width: min(92vw, 460px);
  background: rgba(20, 20, 34, 0.98);
  border: 1px solid var(--gold-dim);
  padding: 0.95rem 1rem;
  color: var(--parchment-dim);
  line-height: 1.65;
  font-size: 0.9rem;
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45);
}

.tutorial-text {
  margin-bottom: 0.8rem;
}

.tutorial-next {
  font-family: var(--font-display);
  font-size: 0.8rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--parchment);
  background: transparent;
  border: 1px solid var(--ghost);
  padding: 0.5em 1.1em;
  cursor: pointer;
}

.tutorial-next:hover {
  border-color: var(--gold-dim);
}

/* ---- Feedback Toast ---- */
.feedback {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--parchment);
  background: var(--bg-surface);
  border: 1px solid var(--gold-dim);
  padding: 0.8em 1.6em;
  opacity: 0;
  transition: all 0.5s ease;
  z-index: 200;
  pointer-events: none;
  letter-spacing: 0.05em;
  text-align: center;
  max-width: 500px;
}

.feedback.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ---- Ending Screen ---- */
.ending-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg-deep);
  z-index: 150;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-y: auto;
  padding:
    max(env(safe-area-inset-top), clamp(1.2rem, 4vh, var(--space-lg)))
    clamp(1rem, 4vw, var(--space-lg))
    max(env(safe-area-inset-bottom), 2.2rem);
  text-align: center;
}

.ending-screen.active {
  display: flex;
  animation: fadeIn 2s ease;
}

.ending-title {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  color: var(--parchment);
  letter-spacing: 0.1em;
  margin-bottom: var(--space-sm);
}

.ending-text {
  font-family: var(--font-body);
  font-size: 1.05rem;
  line-height: 2;
  white-space: pre-line;
  overflow-wrap: anywhere;
  color: var(--parchment-dim);
  max-width: min(92vw, 680px);
  margin-left: auto;
  margin-right: auto;
  text-align: left;
  margin-bottom: var(--space-lg);
}

.ending-stats {
  display: flex;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
  flex-wrap: wrap;
  justify-content: center;
}

.ending-stat {
  text-align: center;
}

.ending-stat-label {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--parchment-dim);
  margin-bottom: 0.3em;
}

.ending-stat-value {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--parchment);
}

.replay-btn {
  font-family: var(--font-display);
  font-size: 0.85rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--parchment-dim);
  background: none;
  border: 1px solid var(--ghost);
  padding: 0.8em 2em;
  cursor: pointer;
  transition: all 0.3s ease;
}

.replay-btn:hover {
  color: var(--parchment);
  border-color: var(--gold-dim);
}

/* ============================================
   Animations
   ============================================ */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes breathe {
  0%, 100% { box-shadow: 0 0 15px rgba(201, 168, 76, 0.05); }
  50%      { box-shadow: 0 0 25px rgba(201, 168, 76, 0.12); }

let gameState = null;
let gameStarted = false;
let feedbackTimer = null;
let activeEndingId = null;

function cloneDeep(value) {
  return JSON.parse(JSON.stringify(value));
}

function normalizeGameConfig(raw) {
  const config = raw && typeof raw === "object" ? raw : {};
  return {
    ...DEFAULT_GAME_CONFIG,
    ...config,
    initial: {
      ...DEFAULT_GAME_CONFIG.initial,
      ...(config.initial || {})
    },
    record: {
      ...DEFAULT_GAME_CONFIG.record,
      ...(config.record || {}),
      seal_penalty: {
        ...DEFAULT_GAME_CONFIG.record.seal_penalty,
        ...((config.record && config.record.seal_penalty) || {})
      }
    },
    rebellion: {
      ...DEFAULT_GAME_CONFIG.rebellion,
      ...(config.rebellion || {})
    },
    endings: {
      ...DEFAULT_GAME_CONFIG.endings,
      ...(config.endings || {})
    },
    imbalance: {
      ...DEFAULT_GAME_CONFIG.imbalance,
      ...(config.imbalance || {})
    },
    cocoa: {
      ...DEFAULT_GAME_CONFIG.cocoa,
      ...(config.cocoa || {})
    },
    resurface: {
      ...DEFAULT_GAME_CONFIG.resurface,
      ...(config.resurface || {}),
      effect: {
        ...DEFAULT_GAME_CONFIG.resurface.effect,
        ...((config.resurface && config.resurface.effect) || {})
      },
      rounds: Array.isArray(config.resurface && config.resurface.rounds)
        ? config.resurface.rounds.map((n) => Number(n)).filter((n) => Number.isFinite(n))
        : [...DEFAULT_GAME_CONFIG.resurface.rounds]
    },
    pressure_thresholds: Array.isArray(config.pressure_thresholds)
      ? config.pressure_thresholds
      : [...DEFAULT_GAME_CONFIG.pressure_thresholds]
  };
}

async function loadGameData() {
  const cacheBust = Date.now();
  const withBust = (path) => `${path}?v=${cacheBust}`;

  const configPromise = fetch(withBust(DATA_PATHS.config), { cache: "no-store" })
    .then((res) => (res.ok ? res.json() : null))
    .catch(() => null);

  const [eventsRes, endingsRes, rawConfig] = await Promise.all([
    fetch(withBust(DATA_PATHS.events), { cache: "no-store" }),
    fetch(withBust(DATA_PATHS.endings), { cache: "no-store" }),
    configPromise
  ]);

  if (!eventsRes.ok) {
    throw new Error(`Failed to load events (${eventsRes.status})`);
  }
  if (!endingsRes.ok) {
    throw new Error(`Failed to load endings (${endingsRes.status})`);
  }

  EVENTS_DATA = await eventsRes.json();
  ENDINGS_DATA = await endingsRes.json();
  GAME_CONFIG = normalizeGameConfig(rawConfig);

  if (!Array.isArray(EVENTS_DATA)) {
    throw new Error("events.json must be an array");
  }
  if (!ENDINGS_DATA || !Array.isArray(ENDINGS_DATA.endings)) {
    throw new Error("endings.json must contain endings[]");
  }

  TOTAL_ROUNDS = Number(GAME_CONFIG.rounds) || 7;
  PRESSURE_GROWTH = Array.isArray(GAME_CONFIG.pressure_growth) && GAME_CONFIG.pressure_growth.length > 0
    ? GAME_CONFIG.pressure_growth.map((n) => Number(n) || 0)
    : [...DEFAULT_GAME_CONFIG.pressure_growth];
}

function createInitialGameState() {
  const initial = GAME_CONFIG.initial;
  const cocoaUses = Math.max(0, Number((GAME_CONFIG.cocoa || {}).uses) || 0);
  return {
    round: 1,
    heaven: Number(initial.heaven) || 50,
    hell: Number(initial.hell) || 50,
    stability: Number(initial.stability) || 50,
    pressure: Number(initial.pressure) || 0,
    truthCounter: 0,
    sealPenaltyNextRound: false,
    rebellionFlag: false,
    rebellion: {
      consecutiveBalanceCount: 0,
      extremeChoiceCount: 0
    },
    choiceOrderByRound: {},
    events: [],
    history: [],
    sealedRecords: [],
    pressureThresholdsFired: [],
    interstitialQueue: [],
    activeInterstitial: null,
    resurfaceFiredThisRound: false,
    cocoaUses,
    cocoaActiveThisRound: false,
    lastImbalanceTriggered: false,
    language: "zh",
    phase: "event",
    tutorialStep: "stats"
  };
}

document.addEventListener("DOMContentLoaded", () => {
  const prologue = document.getElementById("prologue");
  const title = document.getElementById("landing-title");
  const divider = document.getElementById("landing-divider");
  const ctaBtn = document.getElementById("cta-btn");
  const corners = document.querySelectorAll(".corner-mark");

  setTimeout(() => {
    prologue.classList.add("hide");
  }, 3500);

  setTimeout(() => {
    prologue.style.display = "none";
    title.classList.add("show");
    divider.classList.add("show");
  }, 5000);

  setTimeout(() => {
    ctaBtn.classList.add("show");
    corners.forEach((c) => c.classList.add("show"));
  }, 6800);

  window.addEventListener("resize", () => {
    if (gameState && gameState.round === 1) {
      maybeShowTutorial();
    }
  });
  window.addEventListener("orientationchange", () => {
    if (gameState && gameState.round === 1) {
      setTimeout(() => maybeShowTutorial(), 50);
    }
  });
});

function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  const landing = document.getElementById("landing");
  const gameContainer = document.getElementById("game-container");

  landing.classList.add("fade-out");

  setTimeout(() => {
    landing.style.display = "none";
    gameContainer.classList.add("active");
    showLoadingState();
    initGame().catch((error) => {
      gameStarted = false;
      showInitError(error);
    });
  }, 1200);
}

async function initGame() {
  await loadGameData();
  gameState = createInitialGameState();
  gameState.events = buildEventSequence(EVENTS_DATA);
  activeEndingId = null;
  updateLanguageControls();
  updateStatsUI();
  renderRound();
}

function showLoadingState() {
  hideTutorialOverlay();
  const lang = document.documentElement.lang === "en" ? "en" : "zh";
  document.getElementById("event-title").textContent = TEXTS.loading[lang];
  document.getElementById("event-text").textContent = "";
  document.getElementById("choices-container").innerHTML = "";
  document.getElementById("record-phase").style.display = "none";
}

function showInitError(error) {
  hideTutorialOverlay();
  const lang = document.documentElement.lang === "en" ? "en" : "zh";
  document.getElementById("event-title").textContent = TEXTS.initErrorTitle[lang];
  document.getElementById("event-text").textContent = `${TEXTS.initErrorBody[lang]} (${String(error.message || error)})`;
  document.getElementById("record-phase").style.display = "none";
  const choiceBox = document.getElementById("choices-container");
  choiceBox.innerHTML = "";
  const retryBtn = document.createElement("button");
  retryBtn.className = "choice-btn";
  retryBtn.type = "button";
  retryBtn.textContent = TEXTS.retry[lang];
  retryBtn.addEventListener("click", () => {
    showLoadingState();
    initGame().catch((nextError) => {
      gameStarted = false;
      showInitError(nextError);
    });
  });
  choiceBox.appendChild(retryBtn);
}

function buildEventSequence(allEvents) {
  const fixed1 = allEvents.find((e) => e.fixed_position === 1);
  const fixed6 = allEvents.find((e) => e.fixed_position === 6);
  const fixed7 = allEvents.find((e) => e.fixed_position === 7);

  if (!fixed1 || !fixed6 || !fixed7) {
    throw new Error("Missing required fixed-position events.");
  }

  const pool = allEvents.filter((e) => e.fixed_position === null);
  const picked = shuffle(pool).slice(0, 4);
  return [fixed1, ...picked, fixed6, fixed7];
}

function shuffle(items) {
  const list = [...items];
  for (let i = list.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }
  return list;
}

function renderRound() {
  if (!gameState || gameState.phase === "ending") return;

  applySealPenaltyAtRoundStartIfNeeded();

  if (!gameState.activeInterstitial && gameState.phase === "event") {
    maybeQueueResurface();
  }
  if (!gameState.activeInterstitial && gameState.interstitialQueue.length > 0) {
    gameState.activeInterstitial = gameState.interstitialQueue.shift();
    gameState.phase = "interstitial";
  }
  if (gameState.activeInterstitial) {
    renderInterstitial(gameState.activeInterstitial);
    renderRecordPanel();
    updateRoundIndicator();
    updateStatsUI();
    return;
  }

  const currentEvent = getCurrentEvent();
  if (!currentEvent) return;

  document.getElementById("event-card").classList.remove("is-interstitial");
  const titleKey = gameState.language === "zh" ? "title_zh" : "title_en";
  const textKey = gameState.language === "zh" ? "text_zh" : "text_en";
  document.getElementById("event-title").textContent = currentEvent[titleKey];
  document.getElementById("event-text").textContent = currentEvent[textKey];

  renderChoices(currentEvent);
  renderRecordPanel();
  updateRoundIndicator();
  updateStatsUI();
  maybeShowTutorial();
}

function renderInterstitial(item) {
  hideTutorialOverlay();
  const lang = gameState.language;
  const card = document.getElementById("event-card");
  card.classList.add("is-interstitial");
  const title = item[`title_${lang}`] || item.title_en || "";
  const text = item[`text_${lang}`] || item.text_en || "";
  const markerLabel = lang === "zh"
    ? (item.kind === "resurface" ? "档案残响" : "压力警报")
    : (item.kind === "resurface" ? "Vault Echo" : "Pressure Alert");
  const continueLabel = lang === "zh" ? "继续" : "Continue";

  document.getElementById("event-title").innerHTML =
    `<div class="interstitial-marker">${escapeHtml(markerLabel)}</div>${escapeHtml(title)}`;
  document.getElementById("event-text").textContent = text;

  const container = document.getElementById("choices-container");
  container.innerHTML = "";
  const btn = document.createElement("button");
  btn.className = "choice-btn";
  btn.type = "button";
  btn.innerHTML = `<span class="choice-text">${escapeHtml(continueLabel)}</span>`;
  btn.addEventListener("click", dismissInterstitial);
  container.appendChild(btn);
}

function dismissInterstitial() {
  if (!gameState || !gameState.activeInterstitial) return;
  const item = gameState.activeInterstitial;
  const effect = item.effect || {};
  applyEffect(effect);
  gameState.activeInterstitial = null;
  gameState.phase = "event";
  if (Object.values(effect).some((v) => Number(v) !== 0)) {
    showFeedback(`${TEXTS.effectPrefix[gameState.language]}: ${formatEffect(effect)}`, 1800);
  }
  renderRound();
}

function useCocoa() {
  if (!gameState) return;
  if (gameState.cocoaUses <= 0) return;
  if (gameState.cocoaActiveThisRound) return;
  if (gameState.phase !== "event" && gameState.phase !== "record") return;

  gameState.cocoaUses -= 1;
  gameState.cocoaActiveThisRound = true;
  updateCocoaButton();
  showFeedback(
    gameState.language === "zh"
      ? "你喝了一口可可。这一回合的末日稍稍延后。"
      : "You take a sip of cocoa. The end of the world will wait one round.",
    2200
  );
}

function getCurrentEvent() {
  if (!gameState) return null;
  return gameState.events[gameState.round - 1] || null;
}

function getRoundHistory(round) {
  return gameState.history.find((item) => item.round === round) || null;
}

function getRoundChoicesInDisplayOrder(event) {
  if (!gameState || !event || !Array.isArray(event.choices)) return [];

  const roundKey = String(gameState.round);
  if (!gameState.choiceOrderByRound[roundKey]) {
    gameState.choiceOrderByRound[roundKey] = shuffle(event.choices.map((c) => c.id));
  }

  const orderedIds = gameState.choiceOrderByRound[roundKey];
  const choiceMap = new Map(event.choices.map((choice) => [choice.id, choice]));
  const orderedChoices = orderedIds.map((id) => choiceMap.get(id)).filter(Boolean);

  if (orderedChoices.length < event.choices.length) {
    const missingChoices = event.choices.filter((choice) => !orderedIds.includes(choice.id));
    return [...orderedChoices, ...missingChoices];
  }

  return orderedChoices;
}

function applyEffect(effect) {
  if (!effect) return;
  gameState.heaven += Number(effect.heaven) || 0;
  gameState.hell += Number(effect.hell) || 0;
  gameState.stability += Number(effect.stability) || 0;
  gameState.pressure += Number(effect.pressure) || 0;
  clampAllStats();
}

function renderChoices(event) {
  const container = document.getElementById("choices-container");
  container.innerHTML = "";

  const roundHistory = getRoundHistory(gameState.round);
  const selectedChoiceId = roundHistory ? roundHistory.choiceId : null;
  const locked = gameState.phase !== "event";
  const labelKey = gameState.language === "zh" ? "label_zh" : "label_en";
  const consequenceKey = gameState.language === "zh" ? "consequence_zh" : "consequence_en";
  const displayChoices = getRoundChoicesInDisplayOrder(event);
  const slotLabel = (index) => String.fromCharCode(65 + index);

  displayChoices.forEach((choice, index) => {
    const btn = document.createElement("button");
    const isSelected = locked && selectedChoiceId === choice.id;
    btn.className = `choice-btn${choice.is_extreme ? " extreme" : ""}${isSelected ? " selected-consequence" : ""}`;
    btn.type = "button";
    btn.disabled = locked;

    if (!locked) {
      btn.addEventListener("click", () => handleChoice(choice.id));
    } else if (!isSelected) {
      btn.style.opacity = "0.6";
    }
    const displayText = isSelected
      ? (choice[consequenceKey] || choice[labelKey] || "")
      : (choice[labelKey] || "");
    btn.title = displayText;

    btn.innerHTML = `
      <span class="choice-id">${slotLabel(index)}</span>
      <span class="choice-text">${escapeHtml(displayText)}</span>
    `;

    container.appendChild(btn);
  });
}

function handleChoice(choiceId) {
  if (!gameState || gameState.phase !== "event") return;

  const event = getCurrentEvent();
  if (!event) return;

  const choice = event.choices.find((item) => item.id === choiceId);
  if (!choice) return;

  applyEffect(choice.effect);
  if (choice.is_extreme) {
    gameState.rebellion.extremeChoiceCount += 1;
  }

  gameState.history.push({
    round: gameState.round,
    eventId: event.id,
    choiceId: choice.id,
    choiceExtreme: choice.is_extreme,
    choiceEffect: { ...choice.effect },
    recordAction: null,
    recordEffect: null,
    finalSnapshot: null
  });

  gameState.phase = "record";
  if (gameState.round === 1 && gameState.tutorialStep === "wait_record") {
    gameState.tutorialStep = "record";
  }
  renderRound();
  const detailText = formatEffect(choice.effect);
  if (!shouldSuppressFeedback()) {
    showFeedback(`${TEXTS.effectPrefix[gameState.language]}: ${detailText}`, 1800);
  }
}

function shouldSuppressFeedback() {
  if (!gameState) return false;
  return gameState.round === 1 && gameState.tutorialStep !== "done";
}

function renderRecordPanel() {
  const recordPhaseEl = document.getElementById("record-phase");
  const titleEl = document.getElementById("record-title");

  titleEl.textContent = gameState.language === "zh"
    ? "记录阶段 / Archive Phase"
    : "Archive Phase / 记录阶段";
  document.querySelectorAll("[data-en][data-zh]").forEach((el) => {
    el.textContent = el.dataset[gameState.language];
  });

  recordPhaseEl.style.display = gameState.phase === "record" ? "block" : "none";
}

function handleRecord(action) {
  if (!gameState || gameState.phase !== "record") return;
  if (!Object.prototype.hasOwnProperty.call(RECORD_ACTION_MAP, action)) return;

  const recordConfig = GAME_CONFIG.record;
  const recordEffect = { heaven: 0, hell: 0, stability: 0, pressure: 0 };
  let triggeredTruthBonus = false;

  if (action === "truth") {
    gameState.truthCounter += 1;
    if (gameState.truthCounter >= Number(recordConfig.truth_streak_target || 3)) {
      const bonus = Number(recordConfig.truth_stability_bonus || 3);
      gameState.stability += bonus;
      recordEffect.stability += bonus;
      gameState.truthCounter = 0;
      triggeredTruthBonus = true;
    }
  } else if (action === "polish") {
    const bonus = Number(recordConfig.polish_heaven_bonus || 2);
    gameState.heaven += bonus;
    recordEffect.heaven += bonus;
    gameState.truthCounter = 0;
  } else if (action === "blur") {
    const bonus = Number(recordConfig.blur_hell_bonus || 2);
    gameState.hell += bonus;
    recordEffect.hell += bonus;
    gameState.truthCounter = 0;
  } else if (action === "seal") {
    const delta = Number(recordConfig.seal_pressure_delta || -2);
    gameState.pressure += delta;
    recordEffect.pressure += delta;
    gameState.truthCounter = 0;
    if (Math.random() < Number(recordConfig.seal_penalty_chance || 0.2)) {
      gameState.sealPenaltyNextRound = true;
    }
    const sealedEvent = getCurrentEvent();
    const sealedHistory = getRoundHistory(gameState.round);
    if (sealedEvent && sealedHistory) {
      gameState.sealedRecords.push({
        round: gameState.round,
        eventId: sealedEvent.id,
        choiceId: sealedHistory.choiceId
      });
    }
  }

  clampAllStats();

  const roundHistory = getRoundHistory(gameState.round);
  if (roundHistory) {
    roundHistory.recordAction = action;
    roundHistory.recordEffect = recordEffect;
  }

  if (triggeredTruthBonus) {
    showFeedback(TEXTS.truthBonus[gameState.language], 2500);
  } else {
    showFeedback(`${TEXTS.effectPrefix[gameState.language]}: ${formatEffect(recordEffect)}`, 1400);
  }

  completeRound();
}

function completeRound() {
  updateRebellionTracker();
  applyImbalanceErosion();

  const pressureBefore = gameState.pressure;
  if (!gameState.cocoaActiveThisRound) {
    const growth = PRESSURE_GROWTH[gameState.round - 1] || 0;
    gameState.pressure += growth;
  }
  gameState.cocoaActiveThisRound = false;

  clampAllStats();
  queuePressureThresholdInterstitials(pressureBefore, gameState.pressure);

  const roundHistory = getRoundHistory(gameState.round);
  if (roundHistory) {
    roundHistory.finalSnapshot = {
      heaven: gameState.heaven,
      hell: gameState.hell,
      stability: gameState.stability,
      pressure: gameState.pressure,
      truthCounter: gameState.truthCounter
    };
  }
  updateStatsUI();

  if (gameState.round === TOTAL_ROUNDS) {
    gameState.tutorialStep = "done";
    hideTutorialOverlay();
    const rbCfg = GAME_CONFIG.rebellion;
    gameState.rebellionFlag =
      gameState.rebellion.consecutiveBalanceCount >= Number(rbCfg.consecutive_required || 3) &&
      gameState.rebellion.extremeChoiceCount <= Number(rbCfg.max_extreme_choices || 1);
    showEnding(determineEnding(gameState));
    return;
  }

  if (gameState.round >= 1) {
    gameState.tutorialStep = "done";
    hideTutorialOverlay();
  }
  gameState.round += 1;
  gameState.phase = "event";
  gameState.resurfaceFiredThisRound = false;
  renderRound();
}

function applyImbalanceErosion() {
  const cfg = GAME_CONFIG.imbalance || { threshold_diff: 30, stability_penalty: -2 };
  const diff = Math.abs(gameState.heaven - gameState.hell);
  const threshold = Number(cfg.threshold_diff) || 30;
  if (diff > threshold) {
    gameState.stability += Number(cfg.stability_penalty) || 0;
    gameState.lastImbalanceTriggered = true;
  } else {
    gameState.lastImbalanceTriggered = false;
  }
}

function queuePressureThresholdInterstitials(before, after) {
  const list = Array.isArray(GAME_CONFIG.pressure_thresholds) ? GAME_CONFIG.pressure_thresholds : [];
  list.forEach((entry) => {
    const at = Number(entry && entry.at);
    if (!Number.isFinite(at)) return;
    if (gameState.pressureThresholdsFired.includes(at)) return;
    if (before < at && after >= at) {
      gameState.pressureThresholdsFired.push(at);
      gameState.interstitialQueue.push({
        kind: "threshold",
        title_zh: entry.title_zh || "",
        title_en: entry.title_en || "",
        text_zh: entry.text_zh || "",
        text_en: entry.text_en || "",
        effect: entry.effect || {}
      });
    }
  });
}

function maybeQueueResurface() {
  if (gameState.resurfaceFiredThisRound) return;
  const cfg = GAME_CONFIG.resurface || {};
  const rounds = Array.isArray(cfg.rounds) ? cfg.rounds : [];
  if (!rounds.includes(gameState.round)) return;
  if (!Array.isArray(gameState.sealedRecords) || gameState.sealedRecords.length === 0) return;
  if (Math.random() >= Number(cfg.chance || 0)) return;

  const sealed = gameState.sealedRecords.shift();
  const sourceEvent = (gameState.events || []).find((e) => e.id === sealed.eventId);
  if (!sourceEvent) return;
  const choice = (sourceEvent.choices || []).find((c) => c.id === sealed.choiceId);
  if (!choice) return;

  const n = gameState.round - sealed.round;
  const fill = (template, lang) =>
    String(template || "")
      .replace("{n}", String(n))
      .replace("{title}", sourceEvent[`title_${lang}`] || "")
      .replace("{consequence}", choice[`consequence_${lang}`] || choice[`label_${lang}`] || "");

  gameState.resurfaceFiredThisRound = true;
  gameState.interstitialQueue.push({
    kind: "resurface",
    title_zh: "档案残响",
    title_en: "Echo from the Vault",
    text_zh: fill(cfg.template_zh, "zh"),
    text_en: fill(cfg.template_en, "en"),
    effect: cfg.effect || {}
  });
}

function updateRebellionTracker() {
  const rbCfg = GAME_CONFIG.rebellion;
  const balanced = Math.abs(gameState.heaven - gameState.hell) <= Number(rbCfg.balance_diff_max || 10);
  const stable = gameState.stability >= Number(rbCfg.stability_min || 65);

  if (balanced && stable) {
    gameState.rebellion.consecutiveBalanceCount += 1;
  } else {
    gameState.rebellion.consecutiveBalanceCount = 0;
  }
}

function applySealPenaltyAtRoundStartIfNeeded() {
  if (!gameState.sealPenaltyNextRound) return;

  const penalty = GAME_CONFIG.record.seal_penalty || { stability: -5, heaven: 3 };
  gameState.phase = "penalty";
  gameState.stability += Number(penalty.stability || -5);
  gameState.heaven += Number(penalty.heaven || 3);
  gameState.sealPenaltyNextRound = false;
  clampAllStats();
  updateStatsUI();
  showFeedback(TEXTS.sealPenalty[gameState.language], 2800);
  gameState.phase = "event";
}

function determineEnding(state) {
  const endingCfg = GAME_CONFIG.endings;
  if (state.stability < Number(endingCfg.stability_collapse_lt || 20)) return "human_collapse";
  if (state.heaven >= Number(endingCfg.heaven_dominance_gte || 90)) return "heaven_dominance";
  if (state.hell >= Number(endingCfg.hell_dominance_gte || 90)) return "hell_dominance";
  if (state.rebellionFlag && state.pressure < Number(endingCfg.rebellion_pressure_lt || 85)) return "human_rebellion";
  return "false_peace";
}

function showEnding(endingId) {
  const ending = ENDINGS_DATA.endings.find((item) => item.id === endingId);
  if (!ending) return;

  activeEndingId = endingId;
  gameState.phase = "ending";
  gameState.tutorialStep = "done";
  hideTutorialOverlay();

  document.getElementById("ending-title").textContent = ending[`title_${gameState.language}`];
  document.getElementById("ending-text").textContent = ending[`text_${gameState.language}`];
  document.getElementById("ending-stats").innerHTML = `
    <div class="ending-stat">
      <div class="ending-stat-label">Heaven</div>
      <div class="ending-stat-value">${gameState.heaven}</div>
    </div>
    <div class="ending-stat">
      <div class="ending-stat-label">Hell</div>
      <div class="ending-stat-value">${gameState.hell}</div>
    </div>
    <div class="ending-stat">
      <div class="ending-stat-label">Stability</div>
      <div class="ending-stat-value">${gameState.stability}</div>
    </div>
    <div class="ending-stat">
      <div class="ending-stat-label">Pressure</div>
      <div class="ending-stat-value">${gameState.pressure}</div>
    </div>
  `;
  renderRunArchive();
  document.getElementById("ending-screen").classList.add("active");
}

function renderRunArchive() {
  const container = document.getElementById("run-archive");
  if (!container || !gameState) return;
  const lang = gameState.language;
  const titleKey = `title_${lang}`;
  const labelKey = `label_${lang}`;
  const consequenceKey = `consequence_${lang}`;
  const heading = lang === "zh" ? "你留下的档案" : "The Archive You Leave Behind";

  const entries = (gameState.history || [])
    .slice()
    .sort((a, b) => a.round - b.round)
    .map((entry) => {
      const event = (gameState.events || []).find((e) => e.id === entry.eventId);
      if (!event) return "";
      const choice = (event.choices || []).find((c) => c.id === entry.choiceId);
      const title = event[titleKey] || event.title_en || "";
      const choiceLabel = choice ? (choice[labelKey] || choice.label_en || "") : "";
      const consequence = choice ? (choice[consequenceKey] || choice.consequence_en || "") : "";
      const roundLabel = lang === "zh" ? `第 ${entry.round} 回合` : `Round ${entry.round}`;
      return `
        <article class="archive-entry">
          <div class="archive-entry-head">
            <span class="archive-entry-round">${escapeHtml(roundLabel)}</span>
            ${escapeHtml(title)}
          </div>
          <div class="archive-entry-choice">${escapeHtml(choiceLabel)}</div>
          <div class="archive-entry-consequence">${escapeHtml(consequence)}</div>
        </article>
      `;
    })
    .filter(Boolean)
    .join("");

  container.innerHTML = entries
    ? `<div class="run-archive-title">${escapeHtml(heading)}</div>${entries}`
    : "";
}

function updateRoundIndicator() {
  const el = document.getElementById("round-indicator");
  if (!gameState) {
    el.textContent = `Round 1 / ${TOTAL_ROUNDS}`;
    return;
  }

  if (gameState.language === "en") {
    el.textContent = `Round ${gameState.round} / ${TOTAL_ROUNDS}`;
  } else {
    el.textContent = `${TEXTS.round.zh}${gameState.round}回合 / ${TOTAL_ROUNDS}`;
  }
}

function updateStatsUI() {
  if (!gameState) return;

  const stats = ["heaven", "hell", "stability", "pressure"];
  stats.forEach((key) => {
    const value = gameState[key];
    document.getElementById(`stat-${key}-val`).textContent = String(value);
    document.getElementById(`stat-${key}-bar`).style.width = `${value}%`;
  });

  const warnEl = document.getElementById("balance-warning");
  if (warnEl) {
    warnEl.classList.toggle("visible", !!gameState.lastImbalanceTriggered);
  }
  updateCocoaButton();
}

function updateCocoaButton() {
  const btn = document.getElementById("cocoa-btn");
  const count = document.getElementById("cocoa-count");
  if (!btn || !count) return;
  const remaining = gameState ? Math.max(0, gameState.cocoaUses) : 0;
  const spent = remaining <= 0 || (gameState && gameState.cocoaActiveThisRound);
  count.textContent = `×${remaining}`;
  btn.classList.toggle("spent", !!spent);
  btn.disabled = !!spent;
}

function toggleLanguage() {
  if (!gameState) return;
  gameState.language = gameState.language === "zh" ? "en" : "zh";
  document.documentElement.lang = gameState.language;
  updateLanguageControls();
  maybeShowTutorial();

  if (gameState.phase === "ending" && activeEndingId) {
    const ending = ENDINGS_DATA.endings.find((item) => item.id === activeEndingId);
    if (ending) {
      document.getElementById("ending-title").textContent = ending[`title_${gameState.language}`];
      document.getElementById("ending-text").textContent = ending[`text_${gameState.language}`];
    }
    renderRunArchive();
    return;
  }

  renderRound();
}

function maybeShowTutorial() {
  if (!gameState) return;
  if (gameState.round !== 1) {
    gameState.tutorialStep = "done";
    hideTutorialOverlay();
    return;
  }

  if (gameState.tutorialStep === "stats") {
    const target = document.querySelector(".stat-bars");
    if (target) {
      showTutorialOverlay(target, TEXTS.tutorial.stats[gameState.language], false);
    }
    return;
  }

  if (gameState.tutorialStep === "choices" && gameState.phase === "event") {
    const target = document.getElementById("choices-container");
    if (target) {
      showTutorialOverlay(target, TEXTS.tutorial.choices[gameState.language], false);
    }
    return;
  }

  if (gameState.tutorialStep === "record" && gameState.phase === "record") {
    const target = document.getElementById("record-phase");
    if (target) {
      showTutorialOverlay(target, TEXTS.tutorial.record[gameState.language], true);
    }
    return;
  }

  hideTutorialOverlay();
}

function showTutorialOverlay(targetEl, text, isFinalStep) {
  const overlay = document.getElementById("tutorial-overlay");
  const highlight = document.getElementById("tutorial-highlight");
  const bubble = document.getElementById("tutorial-bubble");
  const textEl = document.getElementById("tutorial-text");
  const nextBtn = document.getElementById("tutorial-next");
  const rect = targetEl.getBoundingClientRect();
  const pad = 8;

  textEl.textContent = text;
  nextBtn.textContent = isFinalStep
    ? TEXTS.tutorial.close[gameState.language]
    : TEXTS.tutorial.next[gameState.language];

  highlight.style.left = `${Math.max(8, rect.left - pad)}px`;
  highlight.style.top = `${Math.max(8, rect.top - pad)}px`;
  highlight.style.width = `${Math.max(20, Math.min(window.innerWidth - 16, rect.width + pad * 2))}px`;
  highlight.style.height = `${Math.max(20, rect.height + pad * 2)}px`;

  overlay.classList.add("active");
  bubble.style.visibility = "hidden";
  bubble.style.left = "12px";
  bubble.style.top = "12px";

  requestAnimationFrame(() => {
    const bubbleRect = bubble.getBoundingClientRect();
    const preferBottom = rect.bottom + 16 + bubbleRect.height < window.innerHeight - 8;
    const top = preferBottom
      ? rect.bottom + 16
      : Math.max(8, rect.top - bubbleRect.height - 16);
    const left = Math.min(
      window.innerWidth - bubbleRect.width - 8,
      Math.max(8, rect.left + rect.width / 2 - bubbleRect.width / 2)
    );
    bubble.style.left = `${left}px`;
    bubble.style.top = `${top}px`;
    bubble.style.visibility = "visible";
  });
}

function hideTutorialOverlay() {
  const overlay = document.getElementById("tutorial-overlay");
  if (!overlay) return;
  overlay.classList.remove("active");
}

function advanceTutorialStep() {
  if (!gameState || gameState.round !== 1) {
    hideTutorialOverlay();
    return;
  }

  if (gameState.tutorialStep === "stats") {
    gameState.tutorialStep = "choices";
    maybeShowTutorial();
    return;
  }

  if (gameState.tutorialStep === "choices") {
    gameState.tutorialStep = "wait_record";
    hideTutorialOverlay();
    return;
  }

  if (gameState.tutorialStep === "record") {
    gameState.tutorialStep = "done";
    hideTutorialOverlay();
  }
}

function updateLanguageControls() {
  const btn = document.getElementById("lang-toggle");
  if (!gameState || gameState.language === "zh") {
    btn.textContent = "EN / 中";
  } else {
    btn.textContent = "中 / EN";
  }
  updateRoundIndicator();
}

function formatEffect(effect) {
  const labelMap = STAT_LABELS[gameState.language];
  const lines = ["heaven", "hell", "stability", "pressure"]
    .filter((key) => Number(effect[key]) !== 0)
    .map((key) => `${labelMap[key]} ${effect[key] > 0 ? "+" : ""}${effect[key]}`);

  return lines.length > 0 ? lines.join(" | ") : TEXTS.noShift[gameState.language];
}

function clamp(value) {
  return Math.max(0, Math.min(100, value));
}

function clampAllStats() {
  gameState.heaven = clamp(gameState.heaven);
  gameState.hell = clamp(gameState.hell);
  gameState.stability = clamp(gameState.stability);
  gameState.pressure = clamp(gameState.pressure);
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function showFeedback(content, duration = 2500, asHtml = false) {
  const fb = document.getElementById("feedback");
  if (feedbackTimer) {
    clearTimeout(feedbackTimer);
  }
  if (asHtml) {
    fb.innerHTML = content;
  } else {
    fb.textContent = content;
  }
  fb.classList.add("visible");
  feedbackTimer = setTimeout(() => {
    fb.classList.remove("visible");
    feedbackTimer = null;
  }, duration);
}
</script>

</body>
</html>
